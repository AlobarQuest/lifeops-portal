name: Publish Container Image

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == github.event.repository.default_branch) }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alobarquest/lifeops-portal
          tags: |
            type=sha,format=long
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch || github.event.workflow_run.head_branch == github.event.repository.default_branch }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify deploy
        if: ${{ success() }}
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
        run: |
          set -euo pipefail

          if [ -z "${COOLIFY_WEBHOOK}" ] || [ -z "${COOLIFY_TOKEN}" ]; then
            echo "::error title=Missing Coolify deploy secrets::Set COOLIFY_WEBHOOK and COOLIFY_TOKEN as repository action secrets."
            exit 1
          fi

          echo "Image push completed successfully. Triggering Coolify deploy..."

          http_code="$(
            curl --silent --show-error \
              --output /tmp/coolify_deploy_response \
              --write-out '%{http_code}' \
              --request GET "${COOLIFY_WEBHOOK}" \
              --header "Authorization: Bearer ${COOLIFY_TOKEN}"
          )"

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error title=Coolify deploy webhook failed::Webhook returned HTTP ${http_code}."
            echo "Response body:"
            cat /tmp/coolify_deploy_response
            exit 1
          fi

          echo "Coolify deploy webhook accepted with HTTP ${http_code}."
